<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPark — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --accent:#0a84ff;
  --accent2:#30b0ff;
  --bg:#0b1622;
  --card:#111e2d;
  --text:#ddeeff;
  --muted:#5a7a9a;
  --border:rgba(30,100,180,0.2);
  --input-bg:rgba(10,25,50,0.8);
  --error:#ef4444;
}
body{
  min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  overflow:hidden;
  position:relative;
}
/* Animated background grid */
.bg-grid{
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(10,132,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,132,255,0.04) 1px, transparent 1px);
  background-size:48px 48px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{from{background-position:0 0;}to{background-position:48px 48px;}}
.bg-glow{
  position:fixed;
  width:500px;height:500px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(10,100,255,0.12) 0%, transparent 70%);
  top:-150px;left:-100px;
  animation:glowFloat 8s ease-in-out infinite;
}
.bg-glow2{
  position:fixed;
  width:400px;height:400px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(48,176,255,0.08) 0%, transparent 70%);
  bottom:-100px;right:-80px;
  animation:glowFloat2 10s ease-in-out infinite;
}
@keyframes glowFloat{0%,100%{transform:translate(0,0);}50%{transform:translate(40px,30px);}}
@keyframes glowFloat2{0%,100%{transform:translate(0,0);}50%{transform:translate(-30px,-20px);}}

.card{
  width:100%;max-width:420px;
  padding:40px 44px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  box-shadow:0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(10,132,255,0.05);
  z-index:2;position:relative;
  animation:cardIn .5s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.brand-box{
  width:36px;height:36px;border-radius:9px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:#fff;font-size:14px;
  box-shadow:0 0 20px rgba(10,132,255,0.4);
}
.brand-name{font-family:'Bebas Neue';font-size:20px;letter-spacing:2.5px;color:var(--text);}
.brand-name span{color:var(--accent2);}

h2{font-family:'Bebas Neue';font-size:2rem;color:var(--text);margin-bottom:4px;letter-spacing:1px;}
.subtitle{color:var(--muted);margin-bottom:26px;font-size:13px;}

.field{margin-bottom:16px;}
label{
  font-size:10px;font-weight:700;letter-spacing:1px;
  color:var(--muted);margin-bottom:6px;display:block;
  transition:color .2s;
}
.field:focus-within label{color:var(--accent2);}
.input-wrap{position:relative;}
.input-icon{
  position:absolute;left:13px;top:50%;
  transform:translateY(-50%);font-size:13px;
  pointer-events:none;
}
input{
  width:100%;padding:11px 40px;border-radius:10px;
  border:1.5px solid var(--border);
  background:var(--input-bg);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
input::placeholder{color:var(--muted);}
input:focus{
  border-color:rgba(10,132,255,0.5);
  box-shadow:0 0 0 3px rgba(10,132,255,0.1);
}
input.invalid{
  border-color:rgba(239,68,68,0.6);
  animation:shake .35s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-5px);}
  75%{transform:translateX(5px);}
}
.eye{
  position:absolute;right:12px;top:50%;
  transform:translateY(-50%);cursor:pointer;
  font-size:14px;opacity:.4;transition:opacity .2s;
}
.eye:hover{opacity:.8;}

/* Server-side error banner */
.error-banner{
  display:flex;align-items:center;gap:8px;
  background:rgba(239,68,68,0.12);
  border:1px solid rgba(239,68,68,0.3);
  border-radius:9px;padding:10px 13px;
  margin-bottom:18px;
  color:#fca5a5;font-size:12px;font-weight:500;
  animation:slideDown .3s ease both;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.error-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;flex-shrink:0;}

/* Client-side inline error */
.field-error{
  font-size:11px;color:#fca5a5;margin-top:4px;
  display:none;padding-left:2px;
}
.field-error.show{display:block;}

.btn{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;margin-top:6px;cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;
  position:relative;overflow:hidden;
  box-shadow:0 4px 18px rgba(10,132,255,0.35);
  transition:transform .15s,filter .15s;letter-spacing:.3px;
}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn:active{transform:scale(.98);}
.btn.loading{pointer-events:none;color:transparent;}
.btn.loading::after{
  content:'';position:absolute;
  width:17px;height:17px;top:50%;left:50%;margin:-8.5px 0 0 -8.5px;
  border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.link{text-align:center;margin-top:16px;}
.link a{color:var(--accent2);text-decoration:none;font-size:13px;}
.link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="card">
  <div class="brand">
    <div class="brand-box">P</div>
    <div class="brand-name">SMART<span>PARK</span></div>
  </div>

  <h2>WELCOME BACK</h2>
  <p class="subtitle">Sign in to manage your parking</p>

  {% if error %}
  <div class="error-banner">
    <div class="error-dot"></div>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form id="loginForm" action="/login" method="POST">
    <div class="field">
      <label for="email">EMAIL ADDRESS</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field-error" id="emailErr">Please enter your email</div>
    </div>

    <div class="field">
      <label for="password">PASSWORD</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input id="password" name="password" type="password" placeholder="Your password" autocomplete="current-password">
        <span class="eye" id="eyeBtn" onclick="togglePw()">👁</span>
      </div>
      <div class="field-error" id="passErr">Please enter your password</div>
    </div>

    <button type="submit" class="btn" id="loginBtn">Login →</button>
  </form>

  <div class="link"><a href="/signup">Don't have an account? Sign up</a></div>
</div>

<script>
function togglePw(){
  const p = document.getElementById('password');
  p.type = p.type === 'password' ? 'text' : 'password';
  document.getElementById('eyeBtn').textContent = p.type === 'password' ? '👁' : '🙈';
}

document.getElementById('loginForm').addEventListener('submit', function(e){
  const emailEl = document.getElementById('email');
  const passEl  = document.getElementById('password');
  let bad = false;

  if(!emailEl.value.trim()){
    emailEl.classList.add('invalid');
    document.getElementById('emailErr').classList.add('show');
    setTimeout(()=>emailEl.classList.remove('invalid'),400);
    bad = true;
  } else {
    document.getElementById('emailErr').classList.remove('show');
  }

  if(!passEl.value.trim()){
    passEl.classList.add('invalid');
    document.getElementById('passErr').classList.add('show');
    setTimeout(()=>passEl.classList.remove('invalid'),400);
    bad = true;
  } else {
    document.getElementById('passErr').classList.remove('show');
  }

  if(bad){ e.preventDefault(); return; }

  document.getElementById('loginBtn').classList.add('loading');
});
</script>
</body>
</html>
